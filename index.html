<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAMAR TV - Premium Live Streaming</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-dark: #b5952f;
            --bg-dark: #050505;
            --bg-panel: #121212;
            --text-main: #f0f0f0;
            --text-muted: #888888;
            --border-color: #2a2415;
        }
        body { 
            margin: 0; font-family: 'Montserrat', sans-serif; 
            background: var(--bg-dark); color: var(--text-main); 
            display: flex; flex-direction: row; height: 100vh; overflow: hidden; 
        }
        
        /* Luxury Sidebar */
        #sidebar { 
            width: 340px; background: var(--bg-panel); display: flex; flex-direction: column; 
            border-right: 1px solid var(--border-color); box-shadow: 5px 0 20px rgba(0,0,0,0.9);
            z-index: 10;
        }
        #header { 
            padding: 30px 20px 20px; background: linear-gradient(180deg, #1a1a1a 0%, var(--bg-panel) 100%); 
            border-bottom: 1px solid var(--border-color); text-align: center;
        }
        #header h2 { 
            margin: 0 0 25px 0; font-size: 32px; font-family: 'Cinzel', serif; 
            color: var(--gold); letter-spacing: 4px; font-weight: 600;
            text-shadow: 0 2px 10px rgba(212, 175, 55, 0.2);
        }
        label { 
            font-size: 10px; color: var(--text-muted); text-transform: uppercase; 
            letter-spacing: 1.5px; display: block; margin-bottom: 8px; text-align: left;
        }
        
        /* Premium Inputs & Dropdowns */
        #category-selector, #search {
            width: 100%; padding: 12px 15px; margin-bottom: 15px; background: #0a0a0a; 
            color: var(--text-main); border: 1px solid var(--border-color); 
            border-radius: 4px; outline: none; font-family: 'Montserrat', sans-serif;
            font-size: 13px; transition: all 0.3s ease; box-sizing: border-box;
        }
        #category-selector:focus, #search:focus {
            border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.15);
        }
        #category-selector { cursor: pointer; color: #fff; font-weight: 500;}
        
        /* Channel List Styling */
        #channel-list { flex: 1; overflow-y: auto; padding: 0; margin: 0; list-style: none; }
        .channel-item { 
            display: flex; align-items: center; padding: 12px 20px; 
            border-bottom: 1px solid #1a1a1a; cursor: pointer; transition: all 0.3s ease; 
        }
        .channel-item:hover { background: #1a1814; padding-left: 25px; }
        .channel-item.active { 
            background: linear-gradient(90deg, #241e12 0%, var(--bg-panel) 100%); 
            border-left: 4px solid var(--gold); 
        }
        .channel-item.active .channel-name { color: var(--gold); font-weight: 500; }
        .channel-logo { 
            width: 40px; height: 40px; object-fit: contain; margin-right: 15px; 
            background: #000; border: 1px solid #333; border-radius: 50%; padding: 3px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .channel-info { display: flex; flex-direction: column; overflow: hidden; }
        .channel-name { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.5px;}
        .channel-category { font-size: 10px; color: var(--text-muted); margin-top: 3px; text-transform: uppercase;}
        
        /* Video Area */
        #main { flex: 1; display: flex; flex-direction: column; background: #000; }
        #video-container { 
            flex: 1; display: flex; justify-content: center; align-items: center; 
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        video { width: 100%; height: 100%; outline: none; }
        #status { 
            padding: 15px; background: var(--bg-panel); text-align: center; 
            border-top: 1px solid var(--border-color); font-size: 12px; color: var(--gold);
            letter-spacing: 1px; text-transform: uppercase; font-weight: 500;
        }
        
        /* Elegant Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #332b1a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold-dark); }

        /* MOBILE RESPONSIVE DESIGN */
        @media screen and (max-width: 768px) {
            body { 
                flex-direction: column; 
            }
            #main { 
                flex: none; 
                height: 35vh; 
                width: 100%;
                order: 1; 
            }
            #sidebar { 
                flex: 1; 
                width: 100%; 
                height: 65vh;
                order: 2; 
                border-right: none;
                border-top: 1px solid var(--border-color);
            }
            #header { 
                padding: 15px 15px 10px 15px; 
            }
            #header h2 { 
                font-size: 24px; 
                margin: 0 0 15px 0;
            }
            #status {
                padding: 8px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="header">
            <h2>SAMAR TV</h2>
            
            <label>Sort By Category</label>
            <select id="category-selector">
                <option value="all">All Categories</option>
            </select>

            <input type="text" id="search" placeholder="Search for a channel..." autocomplete="off">
        </div>
        <ul id="channel-list">
            </ul>
    </div>

    <div id="main">
        <div id="video-container">
            <video id="video" controls autoplay playsinline></video>
        </div>
        <div id="status">INITIALIZING SYSTEM...</div>
    </div>

    <script>
        const categorySelector = document.getElementById('category-selector');
        const channelList = document.getElementById('channel-list');
        const searchInput = document.getElementById('search');
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        
        // ഇവിടെ നിങ്ങളുടെ പുതിയ പ്ലേലിസ്റ്റിന്റെ പേര് നൽകിയിരിക്കുന്നു
        const PLAYLIST_URL = 'SAMAR.m3u'; 
        
        let channels = [];
        let hls = null;

        function loadPlaylist() {
            status.textContent = "LOADING PLAYLIST...";
            channelList.innerHTML = '';
            
            fetch(PLAYLIST_URL)
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.text();
                })
                .then(content => {
                    parseM3U(content);
                })
                .catch(error => {
                    status.textContent = `❌ ERROR: UNABLE TO LOAD ${PLAYLIST_URL}`;
                    console.error("Fetch Error:", error);
                });
        }

        // വെബ്സൈറ്റ് തുറക്കുമ്പോൾ നേരിട്ട് SAMAR.m3u ലോഡ് ആകും
        window.onload = () => {
            loadPlaylist();
        };

        function filterChannels() {
            const term = searchInput.value.toLowerCase();
            const selectedCategory = categorySelector.value;
            const items = channelList.getElementsByClassName('channel-item');
            
            Array.from(items).forEach(item => {
                const name = item.getAttribute('data-name').toLowerCase();
                const category = item.getAttribute('data-category');
                
                const matchesSearch = name.includes(term);
                const matchesCategory = selectedCategory === 'all' || category === selectedCategory;
                
                item.style.display = (matchesSearch && matchesCategory) ? 'flex' : 'none';
            });
        }

        searchInput.addEventListener('input', filterChannels);
        categorySelector.addEventListener('change', filterChannels);

        function parseM3U(content) {
            const lines = content.split('\n');
            channels = [];
            let currentChannel = null;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                
                if (line.startsWith('#EXTINF:')) {
                    currentChannel = { 
                        name: 'Unknown Channel', 
                        logo: 'https://via.placeholder.com/40/d4af37/000000?text=TV',
                        category: 'Other'
                    };
                    
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    if (logoMatch) currentChannel.logo = logoMatch[1];
                    
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    if (groupMatch) currentChannel.category = groupMatch[1];

                    const nameMatch = line.match(/tvg-name="([^"]+)"/);
                    if (nameMatch) {
                        currentChannel.name = nameMatch[1];
                    } else if (line.includes(',')) {
                        currentChannel.name = line.substring(line.indexOf(',') + 1).trim();
                    }
                } 
                else if (line.startsWith('http')) {
                    if (currentChannel) {
                        currentChannel.url = line;
                        channels.push(currentChannel);
                        currentChannel = null;
                    }
                }
            }

            populateCategories();
            renderChannels();
            status.textContent = `✅ LOADED ${channels.length} CHANNELS SUCCESSFULLY`;
        }

        function populateCategories() {
            categorySelector.innerHTML = '<option value="all">All Categories</option>';
            const uniqueCategories = [...new Set(channels.map(c => c.category))].sort();
            
            uniqueCategories.forEach(category => {
                if (category && category !== "Other") {
                    const option = document.createElement('option');
                    option.value = category;
                    option.textContent = category;
                    categorySelector.appendChild(option);
                }
            });
            
            if (uniqueCategories.includes("Other")) {
                const option = document.createElement('option');
                option.value = "Other";
                option.textContent = "Other";
                categorySelector.appendChild(option);
            }
        }

        function renderChannels() {
            channelList.innerHTML = '';
            channels.forEach((channel) => {
                const li = document.createElement('li');
                li.className = 'channel-item';
                li.setAttribute('data-name', channel.name);
                li.setAttribute('data-category', channel.category);
                
                li.innerHTML = `
                    <img src="${channel.logo}" class="channel-logo" onerror="this.src='https://via.placeholder.com/40/d4af37/000000?text=TV'">
                    <div class="channel-info">
                        <span class="channel-name">${channel.name}</span>
                        <span class="channel-category">${channel.category}</span>
                    </div>
                `;
                li.onclick = () => {
                    playChannel(channel.url, channel.name, li);
                    if(window.innerWidth <= 768) {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                };
                channelList.appendChild(li);
            });
        }

        function playChannel(url, name, element) {
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            if (element) element.classList.add('active');
            
            status.textContent = `BUFFERING: ${name}...`;

            if (Hls.isSupported()) {
                if (hls) hls.destroy(); 
                
                hls = new Hls({ debug: false });
                hls.loadSource(url);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    status.textContent = `▶️ NOW PLAYING: ${name}`;
                    video.play().catch(e => console.log("Autoplay blocked"));
                });

                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        hls.destroy();
                        status.textContent = `❌ STREAM ERROR: CANNOT PLAY "${name}"`;
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    status.textContent = `▶️ NOW PLAYING: ${name}`;
                    video.play();
                });
            }
        }
    </script>
</body>
</html>
